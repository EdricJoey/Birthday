<script>
  // EDIT NAMA DI SINI
  const girlfriendName = "Elen";
  const nicknameText = "sayangku • cintaku • rumahku";

  document.getElementById("startTitle").textContent = `Untuk ${girlfriendName}`;
  document.getElementById("nicknameText").textContent = nicknameText;
  document.getElementById("dearName").textContent = `Happy Birthday, ${girlfriendName}`;

  let progressInterval;
  let slideInterval;
  let revealInterval;

  function openLetter() {
    const song = document.getElementById("song");
    const startScreen = document.getElementById("startScreen");
    const mainContent = document.getElementById("mainContent");
    const slideshow = document.getElementById("slideshow");
    const overlay = document.getElementById("overlay");
    const progressWrap = document.getElementById("progressWrap");

    startScreen.style.display = "none";
    mainContent.style.display = "block";
    slideshow.style.display = "block";
    overlay.style.display = "block";
    progressWrap.style.display = "block";

    window.scrollTo(0, 0);

    song.play().then(() => {
      startAllEffects();
    }).catch(() => {
      alert("Klik tombolnya sekali lagi ya, browser butuh izin untuk memutar lagu.");
    });
  }

  function startAllEffects() {
    const song = document.getElementById("song");

    revealTextOneByOne(); // ✅ pakai ini
    startProgressBar(song);
    startSlideshow();

    song.addEventListener("ended", () => {
      clearInterval(progressInterval);
      clearInterval(slideInterval);
      clearInterval(revealInterval);
      document.getElementById("progress").style.width = "100%";
      document.querySelectorAll(".wish").forEach(line => line.classList.add("visible"));
    });
  }

  // ✅ TEKS MUNCUL SATU PER SATU (TANPA AUTO SCROLL)
  function revealTextOneByOne() {
    const wishes = document.querySelectorAll(".wish");
    let index = 0;

    function showNext() {
      if (index >= wishes.length) return;

      const el = wishes[index];
      el.classList.add("visible", "typing");

      setTimeout(() => {
        el.classList.remove("typing");
        index++;
        setTimeout(showNext, 1500); // jeda antar paragraf
      }, 2500); // durasi typing
    }

    showNext();
  }

  function startProgressBar(song) {
    const progress = document.getElementById("progress");
    progressInterval = setInterval(() => {
      if (song.duration && !isNaN(song.duration)) {
        progress.style.width = `${(song.currentTime / song.duration) * 100}%`;
      }
    }, 300);
  }

  function startSlideshow() {
    const slides = document.querySelectorAll(".slide");
    let current = 0;

    slideInterval = setInterval(() => {
      slides[current].classList.remove("active");
      current = (current + 1) % slides.length;
      slides[current].classList.add("active");
    }, 6000);
  }

  function createHearts() {
    const hearts = document.getElementById("hearts");
    for (let i = 0; i < 22; i++) {
      const span = document.createElement("span");
      span.textContent = "♡";
      span.style.left = Math.random() * 100 + "vw";
      span.style.animationDelay = Math.random() * 8 + "s";
      span.style.animationDuration = 6 + Math.random() * 6 + "s";
      hearts.appendChild(span);
    }
  }

  createHearts();
</script>
