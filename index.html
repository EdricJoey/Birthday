<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Happy Birthday, Elen</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  min-height:100vh;
  font-family:Georgia,'Times New Roman',serif;
  background:linear-gradient(135deg,#efe1cf,#d8c0a6,#f7efe5);
  color:#4b3528;
  overflow-x:hidden;
}

.start-screen{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:24px;
}

.letter-card{
  background:rgba(255,248,238,0.97);
  border:2px solid rgba(122,89,62,0.32);
  border-radius:34px;
  padding:46px 34px;
  max-width:470px;
  width:100%;
  box-shadow:0 28px 75px rgba(86,56,35,0.28);
  backdrop-filter:blur(18px);
  animation:floatCard 3s ease-in-out infinite;
}

.letter-icon{
  font-size:72px;
  margin-bottom:18px;
}

h1{
  font-size:46px;
  font-weight:700;
  letter-spacing:1px;
  margin-bottom:14px;
}

.nickname{
  display:inline-block;
  margin-bottom:18px;
  padding:8px 16px;
  border-radius:999px;
  background:rgba(139,103,79,0.14);
  color:#7b4f38;
  font-size:15px;
}

.subtitle{
  font-size:16px;
  line-height:1.7;
  margin-bottom:28px;
  color:#6a4d3b;
}

button{
  border:none;
  background:#8b674f;
  color:#fff8ee;
  padding:14px 30px;
  border-radius:999px;
  font-size:16px;
  cursor:pointer;
  box-shadow:0 12px 28px rgba(86,56,35,0.28);
  transition:0.25s ease;
}

button:hover{
  transform:translateY(-2px);
  background:#73513d;
}

.main-content{
  display:none;
  position:relative;
  min-height:100vh;
  padding:56px 18px 120px;
  overflow:hidden;
}

.slideshow{
  position:fixed;
  inset:0;
  z-index:-4;
  overflow:hidden;
  display:none;
}

.slide{
  position:absolute;
  inset:0;
  background-size:cover;
  background-position:center;
  opacity:0;
  transform:scale(1.18);
  filter:blur(8px);
  transition:opacity 2s ease, transform 10s ease, filter 2s ease;
}

.slide.active{
  opacity:0.24;
  transform:scale(1.04);
  filter:blur(3px);
  animation:kenBurns 10s ease forwards;
}

.overlay{
  position:fixed;
  inset:0;
  background:
    radial-gradient(circle at top, rgba(255,248,238,0.75), transparent 48%),
    linear-gradient(135deg, rgba(239,225,207,0.93), rgba(247,239,229,0.86));
  z-index:-3;
  display:none;
}

.vignette{
  position:fixed;
  inset:0;
  background:radial-gradient(circle, transparent 45%, rgba(75,53,40,0.18) 100%);
  z-index:-2;
  pointer-events:none;
  display:none;
}

.letter-paper{
  max-width:800px;
  margin:0 auto;
  background:rgba(255,250,242,0.985);
  border:3px solid rgba(122,89,62,0.34);
  border-radius:38px;
  padding:52px 38px;
  box-shadow:
    0 34px 90px rgba(86,56,35,0.3),
    inset 0 0 0 2px rgba(255,255,255,0.55);
  backdrop-filter:blur(22px);
  animation:softEnter 1.2s ease forwards;
}

.dear-name{
  text-align:center;
  font-size:30px;
  font-weight:700;
  color:#8b674f;
  margin-bottom:36px;
  letter-spacing:2px;
  text-transform:uppercase;
}

.wish{
  font-size:20px;
  line-height:1.95;
  text-align:justify;
  margin:24px 0;
  opacity:0;
  transform:translateY(20px);
  filter:blur(8px);
  transition:opacity 0.8s ease, transform 0.8s ease, filter 0.8s ease;
}

.wish.visible{
  opacity:1;
  transform:translateY(0);
  filter:blur(0);
}

.wish.typing::after{
  content:"|";
  animation:blink 0.75s infinite;
  margin-left:4px;
}

.highlight{
  font-weight:700;
  color:#6f4330;
  background:linear-gradient(transparent 58%, rgba(218,177,137,0.55) 58%);
  padding:0 3px;
  border-radius:4px;
  animation:boldGlow 1.4s ease forwards;
}

.dramatic{
  display:inline-block;
  animation:dramaticPulse 1.8s ease infinite;
}

.final{
  text-align:center;
  font-size:34px;
  color:#7b4f38;
  font-style:italic;
  margin-top:48px;
}

.hearts span{
  position:fixed;
  bottom:-35px;
  color:rgba(126,88,63,0.18);
  animation:riseLove linear infinite;
  pointer-events:none;
  z-index:0;
}

.progress-wrap{
  position:fixed;
  left:20px;
  right:20px;
  bottom:18px;
  height:7px;
  background:rgba(139,103,79,0.16);
  border-radius:999px;
  overflow:hidden;
  z-index:20;
  display:none;
}

.progress{
  width:0%;
  height:100%;
  background:#8b674f;
  border-radius:999px;
}

audio{display:none;}

@keyframes softEnter{
  from{opacity:0;transform:scale(0.97) translateY(18px);filter:blur(12px);}
  to{opacity:1;transform:scale(1) translateY(0);filter:blur(0);}
}

@keyframes floatCard{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-9px);}
}

@keyframes blink{
  0%,45%{opacity:1;}
  46%,100%{opacity:0;}
}

@keyframes riseLove{
  from{
    transform:translateY(0) rotate(0deg) scale(0.8);
    opacity:0;
  }
  20%{opacity:1;}
  to{
    transform:translateY(-115vh) rotate(360deg) scale(1.25);
    opacity:0;
  }
}

@keyframes boldGlow{
  0%{text-shadow:0 0 0 rgba(111,67,48,0);}
  45%{text-shadow:0 0 16px rgba(139,103,79,0.42);}
  100%{text-shadow:0 0 0 rgba(111,67,48,0);}
}

@keyframes dramaticPulse{
  0%,100%{transform:scale(1);}
  50%{transform:scale(1.035);}
}

@keyframes kenBurns{
  from{transform:scale(1.18);}
  to{transform:scale(1.04);}
}

@media(max-width:600px){
  h1{font-size:35px;}
  .dear-name{font-size:23px;}
  .wish{font-size:18px;line-height:1.85;margin:22px 0;}
  .letter-paper{padding:36px 24px;}
  .final{font-size:28px;}
}
</style>
</head>

<body>

<div class="hearts" id="hearts"></div>

<section class="start-screen" id="startScreen">
  <div class="letter-card">
    <div class="letter-icon">💌</div>
    <h1>Untuk Elen</h1>
    <div class="nickname">sayangku • cintaku • rumahku</div>
    <p class="subtitle">Ada satu surat kecil yang ingin aku bacakan pelan-pelan, bersama lagu ini.</p>
    <button onclick="openLetter()">Press the letter</button>
  </div>
</section>

<div class="slideshow" id="slideshow">
  <div class="slide active" style="background-image:url('photo1.jpg')"></div>
  <div class="slide" style="background-image:url('photo2.jpg')"></div>
  <div class="slide" style="background-image:url('photo3.jpg')"></div>
  <div class="slide" style="background-image:url('photo4.jpg')"></div>
</div>

<div class="overlay" id="overlay"></div>
<div class="vignette" id="vignette"></div>

<main class="main-content" id="mainContent">
  <div class="letter-paper">

    <div class="dear-name">Happy Birthday, Elen</div>

    <p class="wish" data-text="<span class='highlight dramatic'>Happy birthday, sayangku.</span>"></p>

    <p class="wish" data-text="<span class='highlight'>Selamat ulang tahun yang ke 28, cintaku.</span> Hari ini bukan sekadar pertambahan angka, tapi tentang bagaimana semesta diam-diam merayakan hadirnya kamu, seseorang yang bukan hanya berarti, tapi juga <span class='highlight'>menjadi bagian dari makna hidupku.</span>"></p>

    <p class="wish" data-text="Aku berdoa, semoga setiap langkahmu selalu dipenuhi jalan yang baik. <span class='highlight'>Semoga semua cita-citamu menemukan jalannya untuk terwujud,</span> dan setiap impian yang kamu simpan dengan sabar perlahan datang menghampiri, tanpa ragu. Semoga Tuhan selalu menjaga kamu, memberkati setiap usahamu, dan melimpahkan rezeki serta kebahagiaan yang tak pernah habis."></p>

    <p class="wish" data-text="<span class='highlight dramatic'>AMIIIINNNN</span>"></p>

    <p class="wish" data-text="Terima kasih karena sudah hadir dalam hidupku. Sejak ada kamu, aku mengenal rasa yang sebelumnya tak pernah benar-benar aku pahami, <span class='highlight'>kebahagiaan yang sederhana, tapi terasa utuh dan menenangkan.</span> Seolah dunia yang dulu berjalan begitu saja, kini punya warna, punya arah, dan punya alasan untuk terus diperjuangkan."></p>

    <p class="wish" data-text="<span class='highlight'>Terima kasih karena sudah mencintaiku dengan begitu tulus.</span> Terima kasih karena selalu ada, bahkan di saat aku tidak mudah untuk dimengerti. Kehadiranmu bukan hanya menemani, tapi juga <span class='highlight'>menguatkan, menenangkan, dan tanpa sadar, menyembuhkan.</span>"></p>

    <p class="wish" data-text="Di hari spesialmu ini, aku hanya ingin kamu bahagia. Sungguh, <span class='highlight'>kebahagiaanmu adalah hal yang paling ingin aku jaga, lebih dari apa pun.</span> Karena di dalam senyummu, aku menemukan arah, dan di sanalah, tujuan hidupku perlahan menjadi jelas. Seolah setiap langkahku, pada akhirnya, selalu ingin kembali padamu."></p>

    <p class="wish" data-text="Aku berharap kita akan terus seperti ini, <span class='highlight'>berjalan berdampingan, melewati waktu tanpa saling melepaskan.</span> Bukan hanya hari ini, tapi untuk hari-hari panjang yang belum kita tulis ceritanya. Jika suatu saat langkah kita terasa berat, aku ingin tetap di sampingmu, menggenggam tanpa banyak kata, memastikan kamu tidak pernah merasa sendiri."></p>

    <p class="wish" data-text="Terima kasih, sayang… karena sudah menjadi <span class='highlight dramatic'>rumah, tempat aku pulang, tanpa harus pergi ke mana-mana.</span>"></p>

    <p class="wish final" data-text="<span class='highlight dramatic'>Love you, always.</span>"></p>

  </div>
</main>

<div class="progress-wrap" id="progressWrap">
  <div class="progress" id="progress"></div>
</div>

<audio id="song" src="song.mp3"></audio>

<script>
let slideInterval;
let progressInterval;

function openLetter(){
  document.getElementById("startScreen").style.display="none";
  document.getElementById("mainContent").style.display="block";
  document.getElementById("slideshow").style.display="block";
  document.getElementById("overlay").style.display="block";
  document.getElementById("vignette").style.display="block";
  document.getElementById("progressWrap").style.display="block";

  window.scrollTo(0,0);

  const song=document.getElementById("song");
  song.play().catch(()=>{
    console.log("song.mp3 belum ada atau browser butuh izin audio.");
  });

  typeParagraphs();
  startSlideshow();
  startProgressBar();
}

function typeParagraphs(){
  const paragraphs=document.querySelectorAll(".wish");
  let pIndex=0;

  function typeNextParagraph(){
    if(pIndex>=paragraphs.length)return;

    const paragraph=paragraphs[pIndex];
    const fullText=paragraph.getAttribute("data-text");

    paragraph.classList.add("visible","typing");

    let i=0;
    let output="";
    let insideTag=false;

    function typeChar(){
      if(i>=fullText.length){
        paragraph.innerHTML=fullText;
        paragraph.classList.remove("typing");

        let pause=900;
        if(fullText.includes("AMIIIINNNN")) pause=1800;
        if(fullText.includes("rumah")) pause=1900;
        if(fullText.includes("Love you")) pause=2200;

        pIndex++;
        setTimeout(typeNextParagraph,pause);
        return;
      }

      const char=fullText[i];

      if(char === "<") insideTag=true;
      output += char;
      if(char === ">") insideTag=false;

      paragraph.innerHTML=output;

      i++;

      let speed=34;

      if(insideTag) speed=0;
      if(char==="," || char===".") speed=180;
      if(char==="…") speed=360;

      setTimeout(typeChar,speed);
    }

    typeChar();
  }

  typeNextParagraph();
}

function startSlideshow(){
  const slides=document.querySelectorAll(".slide");
  let current=0;

  slideInterval=setInterval(()=>{
    slides[current].classList.remove("active");
    current=(current+1)%slides.length;
    slides[current].classList.add("active");
  },8000);
}

function startProgressBar(){
  const song=document.getElementById("song");
  const progress=document.getElementById("progress");

  progressInterval=setInterval(()=>{
    if(song.duration && !isNaN(song.duration)){
      progress.style.width=(song.currentTime/song.duration*100)+"%";
    }
  },300);
}

function createHearts(){
  const hearts=document.getElementById("hearts");
  const symbols=["♡","♥","❥","💕"];

  for(let i=0;i<42;i++){
    const span=document.createElement("span");
    span.textContent=symbols[Math.floor(Math.random()*symbols.length)];
    span.style.left=Math.random()*100+"vw";
    span.style.fontSize=(14+Math.random()*24)+"px";
    span.style.animationDelay=Math.random()*9+"s";
    span.style.animationDuration=(8+Math.random()*9)+"s";
    hearts.appendChild(span);
  }
}

createHearts();
</script>

</body>
</html>
